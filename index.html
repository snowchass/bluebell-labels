<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluebell — Pallet Label Generator</title>
<style>
  :root {
    --blue: #2D4B6E;
    --blue-light: #3a5f8a;
    --blue-pale: #1e3550;
    --black: #0f1923;
    --white: #FAFAFA;
    --gray: #E8E8E8;
    --mid: #7a9ab8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Calibri', 'Calibri', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  /* Flash Global logo text */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 20px;
  }

  .brand-name {
    font-family: 'Calibri', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--white);
    text-transform: uppercase;
  }

  .brand-name span {
    color: var(--mid);
    font-weight: 400;
  }

  .brand-line {
    width: 48px;
    height: 3px;
    background: var(--blue);
    border-radius: 2px;
  }

  .project-tag {
    font-family: 'Calibri', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--mid);
    text-transform: uppercase;
    margin-top: 6px;
  }

  h1 {
    font-family: 'Calibri', sans-serif;
    font-weight: 700;
    font-size: clamp(26px, 5vw, 44px);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  h1 span { color: var(--mid); }

  .subtitle {
    color: var(--mid);
    font-size: 13px;
    margin-top: 8px;
    font-family: 'Calibri', sans-serif;
    letter-spacing: 1px;
  }

  /* Main card */
  .card {
    background: #162030;
    border: 1px solid #243447;
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 24px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
    font-family: 'Calibri', sans-serif;
    margin-bottom: 12px;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 12px;
    color: var(--mid);
    font-family: 'Calibri', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  input[type="text"],
  input[type="number"] {
    background: #1e3550;
    border: 1px solid #2d4b6e;
    border-radius: 8px;
    color: var(--white);
    font-family: 'Calibri', sans-serif;
    font-size: 20px;
    font-weight: 700;
    padding: 14px 16px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--mid); }

  /* Preview */
  .preview-box {
    background: var(--blue);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .preview-box::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .preview-box::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -30px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .preview-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    font-family: 'Calibri', sans-serif;
    margin-bottom: 6px;
  }

  .preview-number {
    font-family: 'Calibri', sans-serif;
    font-weight: 700;
    font-size: clamp(52px, 12vw, 88px);
    color: var(--white);
    line-height: 1;
    letter-spacing: -2px;
    position: relative;
    z-index: 1;
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Calibri', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 14px 20px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-prev, .btn-next {
    background: #1e3550;
    color: var(--white);
    border: 1px solid #2d4b6e;
  }

  .btn-prev:hover, .btn-next:hover { border-color: var(--mid); background: #243d5c; }

  .btn-print {
    width: 100%;
    background: var(--blue);
    color: var(--white);
    font-size: 16px;
    padding: 18px;
    border-radius: 12px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: none;
  }

  .btn-print:hover { background: var(--blue-light); }
  .btn-print svg { width: 20px; height: 20px; }

  .copies-note {
    text-align: center;
    color: var(--mid);
    font-size: 12px;
    font-family: 'Calibri', sans-serif;
    margin-top: 12px;
    letter-spacing: 0.5px;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e3550;
    border: 1px solid var(--blue);
    border-radius: 12px;
    padding: 14px 24px;
    font-family: 'Calibri', sans-serif;
    font-size: 15px;
    color: var(--white);
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 9999;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast-dot {
    width: 8px; height: 8px;
    background: var(--mid);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .toast-next {
    font-weight: 700;
    color: var(--mid);
  }

  /* History */
  .history {
    width: 100%;
    max-width: 520px;
  }

  .history h2 {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
    font-family: 'Calibri', sans-serif;
    margin-bottom: 12px;
  }

  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .history-chip {
    background: #162030;
    border: 1px solid #243447;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Calibri', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #9ab8d4;
    cursor: pointer;
    transition: all 0.15s;
  }

  .history-chip:hover {
    border-color: var(--mid);
    color: var(--white);
    background: #1e3550;
  }

  /* ===================== PRINT STYLES ===================== */
  @media print {
    @page { size: landscape; margin: 0; }
    body, html { margin: 0; padding: 0; background: white; }

    body > * { display: none !important; }
    #print-area { display: block !important; }

    #print-area { width: 100%; }

    .print-page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      page-break-after: always;
      background: white;
      padding: 40px;
    }

    .print-page:last-child { page-break-after: avoid; }

    .print-pallet-label {
      font-family: 'Calibri', sans-serif;
      font-weight: 700;
      font-size: 160pt;
      color: #2D4B6E;
      line-height: 1;
      text-align: center;
    }

    .print-company {
      font-family: 'Calibri', sans-serif;
      font-size: 14pt;
      font-weight: 700;
      color: #2D4B6E;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .print-project {
      font-family: 'Calibri', sans-serif;
      font-size: 10pt;
      color: #7a9ab8;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .print-sub {
      font-family: 'Calibri', sans-serif;
      font-size: 14pt;
      color: #7a9ab8;
      margin-top: 12px;
      letter-spacing: 4px;
      text-align: center;
      text-transform: uppercase;
    }

    .print-border {
      border: 8px solid #2D4B6E;
      border-radius: 20px;
      padding: 48px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .print-copy-num {
      font-family: 'Calibri', sans-serif;
      font-size: 9pt;
      color: #aaa;
      margin-top: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-name">Flash <span>Global</span></div>
    <div class="brand-line"></div>
    <div class="project-tag">Project Bluebell</div>
  </div>
  <h1>Pallet <span>Labels</span></h1>
  <div class="subtitle">Generate · Preview · Print 4×</div>
</header>

<div class="card">
  <div class="section-label">Label Config</div>

  <div class="input-row">
    <div class="input-group">
      <label>Prefix</label>
      <input type="text" id="prefix" value="PA" maxlength="5" placeholder="PA">
    </div>
    <div class="input-group">
      <label>Number</label>
      <input type="number" id="num" value="1" min="1" max="9999">
    </div>
  </div>

  <div class="section-label">Preview</div>
  <div class="preview-box">
    <div class="preview-label">Pallet ID</div>
    <div class="preview-number" id="preview-text">PA-1</div>
  </div>

  <div class="controls">
    <button class="btn btn-prev" onclick="step(-1)">← Previous</button>
    <button class="btn btn-next" onclick="step(1)">Next →</button>
  </div>

  <button class="btn btn-print" onclick="printLabels()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Print 4 Copies
  </button>
  <div class="copies-note">Sends 4 full-page sheets to your printer</div>
</div>

<div class="history">
  <h2>Recent Labels</h2>
  <div class="history-list" id="history-list"></div>
</div>

<div id="print-area" style="display:none;"></div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span>Impresso! Próximo: <span class="toast-next" id="toast-next">PA-2</span></span>
</div>

<script>
  const prefixEl = document.getElementById('prefix');
  const numEl = document.getElementById('num');
  const previewEl = document.getElementById('preview-text');
  const historyList = document.getElementById('history-list');
  const printArea = document.getElementById('print-area');

  let recentLabels = [];

  function getLabelText() {
    const prefix = prefixEl.value.trim().toUpperCase() || 'PA';
    const num = parseInt(numEl.value) || 1;
    return `${prefix}-${num}`;
  }

  function updatePreview() {
    previewEl.textContent = getLabelText();
  }

  function step(delta) {
    const current = parseInt(numEl.value) || 1;
    numEl.value = Math.max(1, current + delta);
    updatePreview();
  }

  function addToHistory(label) {
    if (!recentLabels.includes(label)) {
      recentLabels.unshift(label);
      if (recentLabels.length > 12) recentLabels.pop();
      renderHistory();
    }
  }

  function renderHistory() {
    historyList.innerHTML = recentLabels.map(l =>
      `<div class="history-chip" onclick="loadLabel('${l}')">${l}</div>`
    ).join('');
  }

  function loadLabel(label) {
    const parts = label.split('-');
    prefixEl.value = parts[0];
    numEl.value = parts[1];
    updatePreview();
  }

  const toastEl = document.getElementById('toast');
  const toastNextEl = document.getElementById('toast-next');
  let toastTimer = null;

  function showToast(nextLabel) {
    toastNextEl.textContent = nextLabel;
    toastEl.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3500);
  }

  function printLabels() {
    const label = getLabelText();
    addToHistory(label);

    printArea.innerHTML = Array.from({length: 4}, (_, i) => `
      <div class="print-page">
        <div class="print-company">Flash Global</div>
        <div class="print-project">Project Bluebell</div>
        <div class="print-border">
          <div class="print-sub">Pallet ID</div>
          <div class="print-pallet-label">${label}</div>
          <div class="print-copy-num">Copy ${i + 1} of 4</div>
        </div>
      </div>
    `).join('');

    window.print();

    // Auto-advance after print dialog closes
    const nextNum = (parseInt(numEl.value) || 1) + 1;
    numEl.value = nextNum;
    updatePreview();
    const prefix = prefixEl.value.trim().toUpperCase() || 'PA';
    showToast(`${prefix}-${nextNum}`);
  }

  prefixEl.addEventListener('input', updatePreview);
  numEl.addEventListener('input', updatePreview);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') step(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') step(-1);
    if (e.key === 'Enter') printLabels();
  });

  updatePreview();
</script>
</body>
</html>
